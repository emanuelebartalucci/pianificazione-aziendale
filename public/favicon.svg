<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Gradient per l'intestazione del calendario -->
    <linearGradient id="calHeader" x1="5" y1="8" x2="27" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
    <!-- Gradient per il compasso da disegno -->
    <linearGradient id="compassGrad" x1="23" y1="9" x2="13" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <!-- Griglia tecnica di sfondo (Stile Blueprint/Disegno Tecnico) -->
  <path d="M2 16 h28 M16 2 v28" stroke="#06b6d4" stroke-width="0.5" stroke-dasharray="1 2" opacity="0.45" />
  <circle cx="16" cy="16" r="13" stroke="#06b6d4" stroke-width="0.5" stroke-dasharray="1 3" opacity="0.35" />

  <!-- Scheda del Calendario (Base bianca) -->
  <rect x="5" y="8" width="22" height="20" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" />
  
  <!-- Intestazione colorata del calendario -->
  <path d="M5 11 c0 -1.65 1.35 -3 3 -3 h16 c1.65 0 3 1.35 3 3 v3 h-22 z" fill="url(#calHeader)" />

  <!-- Anelli del calendario -->
  <rect x="9" y="5" width="2" height="5" rx="1" fill="#94a3b8" />
  <rect x="21" y="5" width="2" height="5" rx="1" fill="#94a3b8" />

  <!-- Griglia dei giorni/impegni pianificati -->
  <!-- Riga 1 -->
  <rect x="8" y="16" width="3" height="3" rx="0.5" fill="#38bdf8" />
  <rect x="12" y="16" width="3" height="3" rx="0.5" fill="#e2e8f0" />
  <rect x="16" y="16" width="3" height="3" rx="0.5" fill="#6366f1" />
  <rect x="20" y="16" width="3" height="3" rx="0.5" fill="#e2e8f0" />
  <!-- Riga 2 -->
  <rect x="8" y="21" width="3" height="3" rx="0.5" fill="#e2e8f0" />
  <rect x="12" y="21" width="3" height="3" rx="0.5" fill="#6366f1" />
  <rect x="16" y="21" width="3" height="3" rx="0.5" fill="#e2e8f0" />
  <rect x="20" y="21" width="3" height="3" rx="0.5" fill="#38bdf8" />

  <!-- Compasso da disegno tecnico sovrapposto diagonalmente -->
  <g opacity="0.95">
    <!-- Cerniera del compasso -->
    <circle cx="23" cy="9" r="1.5" fill="#475569" />
    <circle cx="23" cy="9" r="0.7" fill="#cbd5e1" />
    <!-- Asta sinistra che va verso il basso/sinistra -->
    <line x1="23" y1="9" x2="13" y2="25" stroke="url(#compassGrad)" stroke-width="1.8" stroke-linecap="round" />
    <!-- Asta destra che va verso il basso/destra -->
    <line x1="23" y1="9" x2="25" y2="23" stroke="url(#compassGrad)" stroke-width="1.8" stroke-linecap="round" />
    <!-- Rotella di regolazione e vite centrale -->
    <line x1="16.5" y1="17.5" x2="25.5" y2="16" stroke="#64748b" stroke-width="0.8" />
    <circle cx="21" cy="16.7" r="1" fill="#475569" />
    <!-- Punta/mina del compasso che traccia il disegno -->
    <line x1="13" y1="25" x2="11.5" y2="27.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round" />
  </g>
</svg>